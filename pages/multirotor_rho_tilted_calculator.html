<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>通用多旋翼 rho / ACAI 倾角扫描热力图</title>
  <style>
    :root {
      --slate-50: #f8fafc;
      --slate-100: #f1f5f9;
      --slate-200: #e2e8f0;
      --slate-300: #cbd5e1;
      --slate-600: #475569;
      --slate-700: #334155;
      --slate-900: #0f172a;
      --blue-50: #eff6ff;
      --blue-100: #dbeafe;
      --blue-300: #93c5fd;
      --blue-600: #2563eb;
      --blue-700: #1d4ed8;
      --green-50: #f0fdf4;
      --green-100: #dcfce7;
      --green-700: #15803d;
      --green-800: #166534;
      --amber-50: #fffbeb;
      --amber-100: #fef3c7;
      --amber-500: #f59e0b;
      --amber-700: #b45309;
      --amber-800: #92400e;
      --amber-900: #78350f;
      --red-50: #fef2f2;
      --red-100: #fee2e2;
      --red-700: #b91c1c;
      --red-800: #991b1b;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--slate-50);
      color: var(--slate-900);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
    }

    .page { min-height: 100vh; padding: 24px; }
    .container { max-width: 1280px; margin: 0 auto; display: grid; gap: 20px; }
    .card {
      background: #fff;
      border: 1px solid var(--slate-200);
      border-radius: 24px;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.08);
      padding: 24px;
    }
    .header-card { padding: 28px; }
    .pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      background: var(--blue-100);
      color: var(--blue-700);
      padding: 4px 12px;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 12px;
    }
    h1, h2, h3, p { margin-top: 0; }
    h1 { margin-bottom: 0; font-size: clamp(30px, 5vw, 48px); line-height: 1.05; font-weight: 950; letter-spacing: -0.04em; }
    h2 { margin-bottom: 16px; font-size: 24px; line-height: 1.15; font-weight: 950; }
    h3 { margin-bottom: 8px; font-size: 18px; line-height: 1.2; font-weight: 950; }
    p { color: var(--slate-600); line-height: 1.65; }
    .lead { max-width: 1024px; margin-top: 16px; margin-bottom: 0; font-size: 18px; }
    .space-y > * + * { margin-top: 12px; }

    .grid { display: grid; gap: 20px; }
    .grid-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .grid-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .main-grid { grid-template-columns: 1.25fr 0.85fr 0.9fr; }

    .notice {
      border-radius: 16px;
      padding: 16px;
      line-height: 1.55;
    }
    .notice-amber { border-left: 4px solid var(--amber-500); background: var(--amber-50); color: var(--amber-900); }
    .notice-blue { border-left: 4px solid var(--blue-600); background: var(--blue-50); color: #1e3a8a; }
    .rho-box { border-radius: 16px; background: var(--slate-100); padding: 16px; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: 20px; }
    .status-box { margin-top: 16px; border-radius: 16px; padding: 16px; font-size: 18px; font-weight: 950; }
    .status-green { background: var(--green-50); color: var(--green-800); }
    .status-amber { background: var(--amber-50); color: var(--amber-800); }
    .status-red { background: var(--red-50); color: var(--red-800); }

    label { display: block; color: var(--slate-700); font-size: 14px; font-weight: 800; }
    input, select {
      width: 100%;
      margin-top: 4px;
      border: 1px solid var(--slate-300);
      border-radius: 12px;
      padding: 8px 12px;
      font: inherit;
      color: var(--slate-900);
      background: #fff;
      outline: none;
    }
    input:focus, select:focus { border-color: var(--blue-600); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.14); }
    button {
      border: 0;
      border-radius: 12px;
      padding: 10px 16px;
      font: inherit;
      font-weight: 850;
      cursor: pointer;
    }
    button:active { transform: translateY(1px); }
    .btn-blue { background: var(--blue-600); color: #fff; }
    .btn-slate { background: var(--slate-700); color: #fff; }
    .btn-outline-blue { border: 1px solid var(--blue-300); background: #fff; color: var(--blue-700); }
    .btn-outline-red { border: 1px solid #fecaca; background: #fff; color: var(--red-700); padding: 6px 9px; border-radius: 8px; }

    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    thead { background: var(--slate-100); color: var(--slate-700); }
    th, td { padding: 8px; text-align: left; vertical-align: middle; }
    th.right, td.right { text-align: right; }
    tbody tr { border-bottom: 1px solid var(--slate-200); }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    .input-name { width: 64px; }
    .input-num-wide { width: 96px; }
    .input-num-small { width: 80px; }
    .select-dir { width: 96px; }

    .svg-wrap {
      width: 100%;
      border-radius: 16px;
      background: var(--slate-50);
      overflow: hidden;
    }
    svg { display: block; width: 100%; height: auto; }
    pre {
      max-height: 320px;
      overflow: auto;
      border-radius: 16px;
      background: #020617;
      color: #f1f5f9;
      padding: 16px;
      font-size: 14px;
      line-height: 1.5;
      margin: 0;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }
    .badge-green { background: var(--green-100); color: var(--green-700); }
    .badge-amber { background: var(--amber-100); color: var(--amber-700); }
    .badge-red { background: var(--red-100); color: var(--red-700); }

    .margin-block { margin-top: 4px; }
    .margin-table { font-size: 14px; }
    .margin-table th { font-weight: 900; font-size: 12px; color: var(--slate-600); }
    .margin-table td { padding: 8px 6px; }
    .margin-cell { font-weight: 900; white-space: nowrap; padding: 4px 8px; display: inline-block; }
    .margin-pos { color: var(--green-800); background: var(--green-50); border-radius: 6px; }
    .margin-neg { color: var(--red-800); background: var(--red-50); border-radius: 6px; }
    .margin-zero { color: var(--amber-800); background: var(--amber-50); border-radius: 6px; }
    .margin-na { color: var(--slate-600); }


    .heatmap-scroll {
      width: 100%;
      overflow: auto;
      border: 1px solid var(--slate-200);
      border-radius: 16px;
      background: #fff;
    }
    .heatmap-svg {
      min-width: 720px;
      display: block;
    }
    .legend-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 12px;
      color: var(--slate-600);
      font-size: 13px;
      line-height: 1.5;
    }
    .legend-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    .legend-swatch {
      width: 18px;
      height: 12px;
      border-radius: 3px;
      border: 1px solid rgba(15, 23, 42, 0.18);
      display: inline-block;
    }
    .metric-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      margin-top: 16px;
    }
    .metric {
      border: 1px solid var(--slate-200);
      border-radius: 16px;
      background: var(--slate-50);
      padding: 12px;
    }
    .metric .label {
      color: var(--slate-600);
      font-size: 12px;
      font-weight: 800;
      margin-bottom: 4px;
    }
    .metric .value {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 18px;
      font-weight: 950;
      color: var(--slate-900);
    }
    @media (max-width: 920px) {
      .metric-grid { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 1180px) {
      .main-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 920px) {
      .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
      .page { padding: 14px; }
      .card, .header-card { padding: 18px; border-radius: 20px; }
    }

</head>
<body>
  <div id="app"></div>

  <script>
    const EPS = 1e-9;

    function fmt(x, d = 4) {
      if (x === Infinity) return "+∞";
      if (x === -Infinity) return "-∞";
      if (!Number.isFinite(x)) return "NaN";
      if (Math.abs(x) < 0.00005) return "0.0000";
      return x.toFixed(d);
    }

    function clamp(x, lo, hi) {
      return Math.max(lo, Math.min(hi, x));
    }

    function hexToRgb(hex) {
      const h = hex.replace("#", "");
      return {
        r: parseInt(h.slice(0, 2), 16),
        g: parseInt(h.slice(2, 4), 16),
        b: parseInt(h.slice(4, 6), 16)
      };
    }

    function rgbToHex({ r, g, b }) {
      const toHex = (v) => Math.round(clamp(v, 0, 255)).toString(16).padStart(2, "0");
      return `#${toHex(r)}${toHex(g)}${toHex(b)}`;
    }

    function mixHex(a, b, t) {
      const ca = hexToRgb(a);
      const cb = hexToRgb(b);
      return rgbToHex({
        r: ca.r + (cb.r - ca.r) * t,
        g: ca.g + (cb.g - ca.g) * t,
        b: ca.b + (cb.b - ca.b) * t
      });
    }

    function colorForRho(rho, scan) {
      if (!Number.isFinite(rho)) return "#020617";
      if (rho < -EPS) {
        const t = scan.negAbsMax > EPS ? clamp(Math.abs(rho) / scan.negAbsMax, 0, 1) : 0;
        return mixHex("#fef3c7", "#b91c1c", t);
      }
      if (rho > EPS) {
        // 有解/可控区域使用独立色标，只按 ρ>0 的范围归一化，避免被负值范围压扁。
        const t = scan.posMax > EPS ? clamp(rho / scan.posMax, 0, 1) : 0;
        return mixHex("#dcfce7", "#2563eb", t);
      }
      return "#fef3c7";
    }

    function dot(a, b) {
      return a.reduce((s, v, i) => s + v * b[i], 0);
    }

    function norm(a) {
      return Math.sqrt(dot(a, a));
    }

    function det3(M) {
      return (
        M[0][0] * (M[1][1] * M[2][2] - M[1][2] * M[2][1]) -
        M[0][1] * (M[1][0] * M[2][2] - M[1][2] * M[2][0]) +
        M[0][2] * (M[1][0] * M[2][1] - M[1][1] * M[2][0])
      );
    }

    function det4(A) {
      let s = 0;
      for (let c = 0; c < 4; c++) {
        const M = [];
        for (let r = 1; r < 4; r++) {
          const row = [];
          for (let cc = 0; cc < 4; cc++) if (cc !== c) row.push(A[r][cc]);
          M.push(row);
        }
        s += (c % 2 === 0 ? 1 : -1) * A[0][c] * det3(M);
      }
      return s;
    }

    function cross4(u, v, w) {
      const M = [u, v, w];
      const res = [];
      for (let i = 0; i < 4; i++) {
        const minor = [];
        for (let r = 0; r < 4; r++) {
          if (r === i) continue;
          minor.push([M[0][r], M[1][r], M[2][r]]);
        }
        res.push((i % 2 === 0 ? 1 : -1) * det3(minor));
      }
      return res;
    }

    function combinations(n, k) {
      const out = [];
      function rec(start, arr) {
        if (arr.length === k) {
          out.push([...arr]);
          return;
        }
        for (let i = start; i <= n - (k - arr.length); i++) {
          arr.push(i);
          rec(i + 1, arr);
          arr.pop();
        }
      }
      rec(0, []);
      return out;
    }

    function col(B, i) {
      return [B[0][i], B[1][i], B[2][i], B[3][i]];
    }

    function matVec(B, v) {
      return B.map((row) => row.reduce((s, x, i) => s + x * v[i], 0));
    }

    function sub(a, b) {
      return a.map((v, i) => v - b[i]);
    }

    function signOfDir(dir) {
      return dir === "CCW" ? 1 : -1;
    }

    function deg2rad(deg) {
      return Number(deg) * Math.PI / 180;
    }

    function thrustDirParts(rotor, cg) {
      const rx = Number(rotor.x) - cg.x;
      const ry = Number(rotor.y) - cg.y;
      const rr = Math.sqrt(rx * rx + ry * ry);
      const spin = signOfDir(rotor.dir);

      // 电机绕自身机臂轴线倾斜。
      // 正倾角定义为：水平切向推力分量产生的 yaw 力矩方向
      // 与该桨气动反扭矩方向一致，从而增强 yaw authority。
      // 因此 CW 和 CCW 的切向方向相反：t = s * [-y/r, x/r]。
      const tx = rr > EPS ? spin * (-ry / rr) : 0;
      const ty = rr > EPS ? spin * ( rx / rr) : 0;
      return { rx, ry, rr, spin, tx, ty };
    }

    function buildB(rotors, cg) {
      const B = [[], [], [], []];
      rotors.forEach((r, i) => {
        const { rx, ry, tx, ty, spin } = thrustDirParts(r, cg);
        const rz = Number(r.z) - cg.z;
        const theta = deg2rad(Number(r.tiltDeg) || 0);
        const st = Math.sin(theta);
        const ct = Math.cos(theta);

        // 控制变量 f_i 为该电机沿桨盘法向/推力方向的推力大小，单位 N。
        // F_i / f_i = [sinθ tx, sinθ ty, cosθ]。
        const fx = st * tx;
        const fy = st * ty;
        const fz = ct;

        B[0][i] = fz;
        B[1][i] = ry * fz - rz * fy;
        B[2][i] = rz * fx - rx * fz;
        B[3][i] = rx * fy - ry * fx + spin * Number(r.kmu) * ct;
      });
      return B;
    }

    function rank4(B) {
      const n = B[0].length;
      if (n < 4) return 0;
      let best = 0;
      for (const S of combinations(n, 4)) {
        const A = [0, 1, 2, 3].map((r) => S.map((c) => B[r][c]));
        best = Math.max(best, Math.abs(det4(A)));
      }
      return best > EPS ? 4 : 3;
    }

    function computeRho(rotors, params, duct) {
      const cg = { x: Number(params.cgx), y: Number(params.cgy), z: Number(params.cgz) };
      const B0 = buildB(rotors, cg);
      const rotorLimits = rotors.map((r) => Math.max(0, Number(r.eta) * Number(r.K)));
      const aug = augmentBWithDuct(B0, rotorLimits, duct);
      const B = aug.B;
      const limits = aug.limits;
      const n = B[0].length;            // 列数 = 电机数 + 涵道列数
      const nRotors = rotors.length;
      const G = [Number(params.mass) * Number(params.g), 0, 0, 0];
      const rank = rank4(B);

      if (n < 4 || rank < 4) {
        return { rho: -Infinity, B, rank, G, limits, rotorLimits, nRotors, hasDuct: aug.hasDuct, details: [], center: [0, 0, 0, 0] };
      }

      const fc = limits.map((v) => v / 2);
      const center = matVec(B, fc);
      const centerMinusG = sub(center, G);
      const all = Array.from({ length: n }, (_, i) => i);
      const details = [];

      for (const S of combinations(n, 3)) {
        let xi = cross4(col(B, S[0]), col(B, S[1]), col(B, S[2]));
        const nn = norm(xi);
        const S2 = all.filter((x) => !S.includes(x));
        if (nn < EPS) {
          details.push({ S, S2, dj: Infinity });
          continue;
        }
        xi = xi.map((x) => x / nn);
        let half = 0;
        for (const idx of S2) half += 0.5 * limits[idx] * Math.abs(dot(xi, col(B, idx)));
        const offset = Math.abs(dot(xi, centerMinusG));
        details.push({ S, S2, dj: half - offset, half, offset, xi });
      }

      const finite = details.filter((x) => Number.isFinite(x.dj));
      if (!finite.length) return { rho: -Infinity, B, rank, G, limits, rotorLimits, nRotors, hasDuct: aug.hasDuct, details: [], center };

      const minD = Math.min(...finite.map((x) => x.dj));
      let rho = minD;
      if (Math.abs(rho) < 5e-7) rho = 0;
      finite.sort((a, b) => a.dj - b.dj);

      return { rho, B, rank, G, limits, rotorLimits, nRotors, hasDuct: aug.hasDuct, details: finite, center };
    }

    // 三轴力矩裕度：在维持悬停 (Fz = mg) 的前提下，分别沿 ±τx / ±τy / ±τz
    // 方向从 G 出发，求射线与可达集 Ω 边界的距离。
    // 每个 3-子集 S 对应一对平行超平面 |ξ·(F - center)| ≤ half，
    // 求射线 F = G + t·d 与所有超平面带的交集即得 [tMin, tMax]。
    function computeMomentMargins(rotors, params, duct) {
      const cg = { x: Number(params.cgx), y: Number(params.cgy), z: Number(params.cgz) };
      const B0 = buildB(rotors, cg);
      const rotorLimits = rotors.map((r) => Math.max(0, Number(r.eta) * Number(r.K)));
      const aug = augmentBWithDuct(B0, rotorLimits, duct);
      const B = aug.B;
      const limits = aug.limits;
      const n = B[0].length;
      const G = [Number(params.mass) * Number(params.g), 0, 0, 0];
      const rank = rank4(B);

      const axes = ["mx", "my", "mz"];
      const dirs = { mx: [0, 1, 0, 0], my: [0, 0, 1, 0], mz: [0, 0, 0, 1] };

      const empty = { pos: NaN, neg: NaN, min: NaN, range: NaN, tMax: NaN, tMin: NaN };
      const blank = { mx: { ...empty }, my: { ...empty }, mz: { ...empty }, feasible: false, rank, n };

      if (n < 4 || rank < 4) return blank;

      const fc = limits.map((v) => v / 2);
      const center = matVec(B, fc);

      const tMax = { mx: Infinity, my: Infinity, mz: Infinity };
      const tMin = { mx: -Infinity, my: -Infinity, mz: -Infinity };

      for (const S of combinations(n, 3)) {
        let xi = cross4(col(B, S[0]), col(B, S[1]), col(B, S[2]));
        const nn = norm(xi);
        if (nn < EPS) continue;
        xi = xi.map((x) => x / nn);

        const S2 = [];
        for (let i = 0; i < n; i++) if (!S.includes(i)) S2.push(i);

        let half = 0;
        for (const idx of S2) half += 0.5 * limits[idx] * Math.abs(dot(xi, col(B, idx)));

        const a = dot(xi, sub(G, center));

        for (const ax of axes) {
          const b = dot(xi, dirs[ax]);
          if (Math.abs(b) < EPS) continue;
          let tUp, tLo;
          if (b > 0) {
            tUp = (half - a) / b;
            tLo = (-half - a) / b;
          } else {
            tUp = (-half - a) / b;
            tLo = (half - a) / b;
          }
          if (tUp < tMax[ax]) tMax[ax] = tUp;
          if (tLo > tMin[ax]) tMin[ax] = tLo;
        }
      }

      const result = { feasible: true, rank, n };
      for (const ax of axes) {
        const hi = tMax[ax];
        const lo = tMin[ax];
        // 收紧 -0
        const pos = Math.abs(hi) < 5e-7 ? 0 : hi;
        const neg = Math.abs(-lo) < 5e-7 ? 0 : -lo;
        result[ax] = {
          tMax: hi,
          tMin: lo,
          pos,                            // +方向裕度
          neg,                            // -方向裕度（正数）
          min: Math.min(pos, neg),        // 对称裕度（较小者）
          range: Number.isFinite(hi) && Number.isFinite(lo) ? hi - lo : NaN
        };
      }
      return result;
    }

    function presetHex(layout) {
      const d = 0.275;
      const xy = [
        [0, d],
        [(Math.sqrt(3) / 2) * d, 0.5 * d],
        [(Math.sqrt(3) / 2) * d, -0.5 * d],
        [0, -d],
        [-(Math.sqrt(3) / 2) * d, -0.5 * d],
        [-(Math.sqrt(3) / 2) * d, 0.5 * d],
      ];
      const dirs = layout === "PNPNPN"
        ? ["CW", "CCW", "CW", "CCW", "CW", "CCW"]
        : ["CW", "CW", "CCW", "CCW", "CW", "CCW"];
      return xy.map((p, i) => ({ id: i + 1, name: String(i + 1), x: +p[0].toFixed(6), y: +p[1].toFixed(6), z: 0, dir: dirs[i], eta: 1, K: 6.125, kmu: 0.1, tiltDeg: 10 }));
    }

    function presetQuad() {
      const a = 0.225 / Math.sqrt(2);
      const xy = [[a, a], [a, -a], [-a, -a], [-a, a]];
      const dirs = ["CW", "CCW", "CW", "CCW"];
      return xy.map((p, i) => ({ id: i + 1, name: String(i + 1), x: +p[0].toFixed(6), y: +p[1].toFixed(6), z: 0, dir: dirs[i], eta: 1, K: 5, kmu: 0.08, tiltDeg: 10 }));
    }

    function presetOcto() {
      const R = 0.35;
      return Array.from({ length: 8 }, (_, i) => {
        const a = Math.PI / 2 - (2 * Math.PI * i) / 8;
        return { id: i + 1, name: String(i + 1), x: +(R * Math.cos(a)).toFixed(6), y: +(R * Math.sin(a)).toFixed(6), z: 0, dir: i % 2 === 0 ? "CW" : "CCW", eta: 1, K: 5.5, kmu: 0.08, tiltDeg: 10 };
      });
    }

    function badgeHTML(rho) {
      if (rho > 0) return '<span class="badge badge-green">Controllable</span>';
      if (rho === 0) return '<span class="badge badge-amber">Boundary</span>';
      return '<span class="badge badge-red">Uncontrollable</span>';
    }

    function fmtMargin(v) {
      if (!Number.isFinite(v)) return "—";
      return fmt(v, 2);
    }

    function marginClass(v) {
      if (!Number.isFinite(v)) return "margin-cell margin-na";
      if (v > EPS) return "margin-cell margin-pos";
      if (v < -EPS) return "margin-cell margin-neg";
      return "margin-cell margin-zero";
    }

    // 带显式 + 号的数字。正数加 "+"，负数已含 "-"，约零显示为 0.00 不加号。
    function fmtSigned(v, d = 2) {
      if (!Number.isFinite(v)) return "—";
      if (Math.abs(v) < 5e-5) return (0).toFixed(d);
      const s = v.toFixed(d);
      return v > 0 ? `+${s}` : s;
    }

    // 显式区间 [τ_min, τ_max]，端点带 ± 号。
    // 当 tMin > tMax 时说明沿该轴的射线根本不与 Ω 相交（feasible interval = ∅）。
    function rangeIsEmpty(tMin, tMax) {
      return Number.isFinite(tMin) && Number.isFinite(tMax) && tMin > tMax + 1e-6;
    }

    function fmtRange(tMin, tMax, d = 2) {
      if (!Number.isFinite(tMin) || !Number.isFinite(tMax)) return "—";
      if (rangeIsEmpty(tMin, tMax)) return "∅ (LP 不可行)";
      return `[${fmtSigned(tMin, d)},&nbsp;${fmtSigned(tMax, d)}]`;
    }

    // 区间是否包含 0；包含则该轴 hover 可行。EPS 容差用于浮点判等。
    function rangeContainsZero(tMin, tMax) {
      if (!Number.isFinite(tMin) || !Number.isFinite(tMax)) return false;
      if (rangeIsEmpty(tMin, tMax)) return false;
      return tMin <= 1e-6 && tMax >= -1e-6;
    }

    function rangeClass(tMin, tMax) {
      if (!Number.isFinite(tMin) || !Number.isFinite(tMax)) return "margin-cell margin-na";
      return rangeContainsZero(tMin, tMax) ? "margin-cell margin-pos" : "margin-cell margin-neg";
    }

    function marginCardHTML(margins) {
      if (!margins.feasible) {
        return `
          <div class="margin-block">
            <h3 style="margin-top: 12px;">三轴力矩裕度 / N·m</h3>
            <div class="notice notice-amber">电机数不足或 Bf 矩阵 rank &lt; 4，无法计算力矩裕度。</div>
          </div>
        `;
      }
      const axes = [
        { key: "mx", label: "τx (roll)" },
        { key: "my", label: "τy (pitch)" },
        { key: "mz", label: "τz (yaw)" }
      ];
      const rows = axes.map((ax) => {
        const m = margins[ax.key];
        const contains = rangeContainsZero(m.tMin, m.tMax);
        const containsBadge = contains
          ? '<span class="badge badge-green">含 0</span>'
          : '<span class="badge badge-red">不含 0</span>';
        // min-side：包含 0 时为正（worst direction 边距），不含 0 时为负（到 0 的距离取负）
        return `
          <tr>
            <td class="mono"><b>${ax.label}</b></td>
            <td class="right mono ${rangeClass(m.tMin, m.tMax)}">${fmtRange(m.tMin, m.tMax)}</td>
            <td class="right mono">${fmtSigned(m.tMin)}</td>
            <td class="right mono">${fmtSigned(m.tMax)}</td>
            <td>${containsBadge}</td>
            <td class="right mono ${marginClass(m.min)}"><b>${fmtSigned(m.min)}</b></td>
          </tr>
        `;
      }).join("");
      return `
        <div class="margin-block">
          <h3 style="margin-top: 16px;">三轴力矩裕度 / N·m</h3>
          <p style="margin-bottom: 8px; font-size: 13px;">在维持 Fz=mg 且其它两轴力矩为 0 的前提下，绕该轴可达的力矩区间 [τ_min, τ_max]。区间 <b>包含 0</b> ⇔ 该轴 hover 可行；<b>不含 0</b> 表示该轴存在不可消除的偏置力矩。最右列 min-side = min(τ_max, −τ_min)：正值代表两侧都有余量（取较小的一侧），负值代表到可行性边界的距离。</p>
          <div class="table-wrap">
            <table class="margin-table">
              <thead>
                <tr>
                  <th>轴</th>
                  <th class="right">可达区间 [τ_min, τ_max] / N·m</th>
                  <th class="right">τ_min</th>
                  <th class="right">τ_max</th>
                  <th>含 0?</th>
                  <th class="right">min-side<br/>= min(τ_max, −τ_min)</th>
                </tr>
              </thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        </div>
      `;
    }

    function escapeHTML(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    // 默认参数：用户提供的六旋翼飞行器参数
    // 原始坐标单位为 mm，此处统一换算为 m。
    // 顺 = CW，逆 = CCW。
    // kμ = Cq / Ct = 8.6704128e-5 / 8.4897792e-4 ≈ 0.10212766。
    // 注意：原始参数未提供最大转速 rpm_max，因此默认 K 按需求设为 3500 N。
    // 可在电机参数表中为每个桨单独设置不同 K。若有真实最大转速，也可将 K 改为 Ct * rpm_max^2。
    let params = {
      mass: 1144.41,
      g: 9.81,
      defaultK: 3500,
      defaultKmu: 0.1021276595744681,
      defaultTiltDeg: 10,
      cgx: 0.612903,
      cgy: 0.152299,
      cgz: 1.072025
    };
    let preset = "custom";
    let rotors = [
      { id: 1, name: "1", x: -1.893, y: -2.306, z: 2.09082,  dir: "CCW", eta: 1, K: 3500, kmu: 0.1021276595744681, tiltDeg: 10 },
      { id: 2, name: "2", x:  0.700, y: -2.505, z: 1.785885, dir: "CW",  eta: 1, K: 3500, kmu: 0.1021276595744681, tiltDeg: 10 },
      { id: 3, name: "3", x:  3.293, y: -2.306, z: 2.085885, dir: "CCW", eta: 1, K: 3500, kmu: 0.1021276595744681, tiltDeg: 10 },
      { id: 4, name: "4", x:  3.293, y:  2.306, z: 2.085885, dir: "CW",  eta: 1, K: 3500, kmu: 0.1021276595744681, tiltDeg: 10 },
      { id: 5, name: "5", x:  0.700, y:  2.505, z: 1.785885, dir: "CCW", eta: 1, K: 3500, kmu: 0.1021276595744681, tiltDeg: 10 },
      { id: 6, name: "6", x: -1.893, y:  2.306, z: 2.085885, dir: "CW",  eta: 1, K: 3500, kmu: 0.1021276595744681, tiltDeg: 10 }
    ];

    // CG 扫描参数。界面使用 mm，计算时换算为 m。
    // 默认：x = 400..900 mm，y = -200..200 mm，步长 10 mm。
    // metric: rho / mx / my / mz —— 决定热力图显示哪个指标。
    // includeDuctFailure: 是否把涵道失效加入扫描场景。
    let scanParams = {
      xMinMm: 400,
      xMaxMm: 900,
      yMinMm: -200,
      yMaxMm: 200,
      stepMm: 10,
      metric: "rho",
      includeDuctFailure: false
    };

    // 水平涵道：作为一个双向辅助力矩源 u ∈ [-maxTorque, +maxTorque]，
    // 对所选轴贡献力矩，不影响 Fz。
    // 在 B 中通过添加两根反向列 (+d, -d) 各以 [0, maxTorque] 为上界实现 [-x, +x] 段。
    // 默认轴：τz (yaw)，与典型水平涵道偏航增强用途一致。
    let duct = {
      enabled: false,
      axis: "tauz",      // taux / tauy / tauz
      maxTorque: 200     // N·m
    };

    const DUCT_AXIS_VEC = {
      taux: [0, 1, 0, 0],
      tauy: [0, 0, 1, 0],
      tauz: [0, 0, 0, 1]
    };

    const DUCT_AXIS_LABEL = {
      taux: "τx (roll)",
      tauy: "τy (pitch)",
      tauz: "τz (yaw)"
    };

    function ductActive(d) {
      return d && d.enabled && Number.isFinite(d.maxTorque) && d.maxTorque > 0;
    }

    function augmentBWithDuct(B, limits, d) {
      if (!ductActive(d)) return { B, limits, hasDuct: false };
      const vec = DUCT_AXIS_VEC[d.axis] || DUCT_AXIS_VEC.tauz;
      const Bnew = B.map((row, r) => [...row, vec[r], -vec[r]]);
      const limitsNew = [...limits, d.maxTorque, d.maxTorque];
      return { B: Bnew, limits: limitsNew, hasDuct: true };
    }

    function updateParam(key, value) {
      const num = Number(value);
      params = { ...params, [key]: num };

      // 全局默认 K / kμ 改动时，同步更新当前已有电机。
      // 这样修改“默认最大升力 K / N”后，下面 6 个电机的 K 会一起变化。
      if (key === "defaultK") {
        rotors = rotors.map((r) => ({ ...r, K: num }));
      }
      if (key === "defaultKmu") {
        rotors = rotors.map((r) => ({ ...r, kmu: num }));
      }
      if (key === "defaultTiltDeg") {
        rotors = rotors.map((r) => ({ ...r, tiltDeg: num }));
      }

      render();
    }

    function updateScanParam(key, value) {
      if (key === "metric") {
        scanParams = { ...scanParams, metric: String(value) };
        render();
        return;
      }
      if (key === "includeDuctFailure") {
        scanParams = { ...scanParams, includeDuctFailure: String(value) === "1" || value === true };
        render();
        return;
      }
      let num = Number(value);
      if (!Number.isFinite(num)) num = scanParams[key];
      if (key === "stepMm") num = Math.max(1, Math.abs(num));
      scanParams = { ...scanParams, [key]: num };
      render();
    }

    function updateDuct(key, value) {
      if (key === "enabled") {
        duct = { ...duct, enabled: String(value) === "1" || value === true };
      } else if (key === "axis") {
        duct = { ...duct, axis: String(value) };
      } else if (key === "maxTorque") {
        const num = Number(value);
        duct = { ...duct, maxTorque: Number.isFinite(num) ? Math.max(0, num) : 0 };
      }
      render();
    }

    function updateRotor(i, key, value) {
      preset = "custom";
      rotors = rotors.map((r, idx) => idx === i ? { ...r, [key]: key === "dir" || key === "name" ? value : Number(value) } : r);
      render();
    }

    function loadPreset(name) {
      preset = name;
      if (name === "PNPNPN" || name === "PPNNPN") {
        params = { mass: 1.535, g: 9.8, defaultK: 6.125, defaultKmu: 0.1, defaultTiltDeg: 10, cgx: 0, cgy: 0, cgz: 0 };
        rotors = presetHex(name);
      } else if (name === "quadX") {
        params = { mass: 1.2, g: 9.8, defaultK: 5, defaultKmu: 0.08, defaultTiltDeg: 10, cgx: 0, cgy: 0, cgz: 0 };
        rotors = presetQuad();
      } else if (name === "octoAlt") {
        params = { mass: 2.6, g: 9.8, defaultK: 5.5, defaultKmu: 0.08, defaultTiltDeg: 10, cgx: 0, cgy: 0, cgz: 0 };
        rotors = presetOcto();
      }
      render();
    }

    function addRotor() {
      preset = "custom";
      const n = rotors.length + 1;
      const R = 0.275;
      const a = Math.PI / 2 - (2 * Math.PI * (n - 1)) / Math.max(6, n);
      rotors = [...rotors, { id: Date.now(), name: String(n), x: +(R * Math.cos(a)).toFixed(4), y: +(R * Math.sin(a)).toFixed(4), z: 0, dir: n % 2 ? "CW" : "CCW", eta: 1, K: params.defaultK, kmu: params.defaultKmu, tiltDeg: params.defaultTiltDeg }];
      render();
    }

    function removeLastRotor() {
      rotors = rotors.slice(0, -1);
      render();
    }

    function resetEta() {
      rotors = rotors.map((r) => ({ ...r, eta: 1 }));
      render();
    }

    function paramField(key, label) {
      return `
        <label>${label}
          <input data-kind="param" data-key="${key}" type="number" step="0.001" value="${escapeHTML(params[key])}" />
        </label>
      `;
    }

    function scanField(key, label) {
      return `
        <label>${label}
          <input data-kind="scan" data-key="${key}" type="number" step="${key === "stepMm" ? "1" : "10"}" value="${escapeHTML(scanParams[key])}" />
        </label>
      `;
    }

    function rotorRows() {
      return rotors.map((r, i) => `
        <tr>
          <td class="mono">${i + 1}</td>
          <td><input class="input-name" data-kind="rotor" data-index="${i}" data-key="name" value="${escapeHTML(r.name)}" /></td>
          <td><input class="input-num-wide" data-kind="rotor" data-index="${i}" data-key="x" type="number" step="0.001" value="${escapeHTML(r.x)}" /></td>
          <td><input class="input-num-wide" data-kind="rotor" data-index="${i}" data-key="y" type="number" step="0.001" value="${escapeHTML(r.y)}" /></td>
          <td><input class="input-num-wide" data-kind="rotor" data-index="${i}" data-key="z" type="number" step="0.001" value="${escapeHTML(r.z)}" /></td>
          <td>
            <select class="select-dir" data-kind="rotor" data-index="${i}" data-key="dir">
              <option value="CW" ${r.dir === "CW" ? "selected" : ""}>CW/P</option>
              <option value="CCW" ${r.dir === "CCW" ? "selected" : ""}>CCW/N</option>
            </select>
          </td>
          <td><input class="input-num-small" data-kind="rotor" data-index="${i}" data-key="eta" type="number" step="0.01" value="${escapeHTML(r.eta)}" /></td>
          <td><input class="input-num-small" data-kind="rotor" data-index="${i}" data-key="K" type="number" step="0.001" value="${escapeHTML(r.K)}" /></td>
          <td><input class="input-num-small" data-kind="rotor" data-index="${i}" data-key="kmu" type="number" step="0.001" value="${escapeHTML(r.kmu)}" /></td>
          <td><input class="input-num-small" data-kind="rotor" data-index="${i}" data-key="tiltDeg" type="number" step="0.1" value="${escapeHTML(r.tiltDeg ?? 0)}" /></td>
          <td><button class="btn-outline-red" data-action="fail-rotor" data-index="${i}">η=0</button></td>
        </tr>
      `).join("");
    }

    function layoutSVG(scale, maxK) {
      const grid = Array.from({ length: 11 }, (_, i) => {
        const p = 30 + i * 40;
        return `<g><line x1="30" y1="${p}" x2="430" y2="${p}" stroke="#e2e8f0" /><line x1="${p}" y1="30" x2="${p}" y2="430" stroke="#e2e8f0" /></g>`;
      }).join("");

      const arms = rotors.map((r) => {
        const x = 230 + (Number(r.x) - Number(params.cgx)) * scale;
        const y = 230 - (Number(r.y) - Number(params.cgy)) * scale;
        return `<line x1="230" y1="230" x2="${x}" y2="${y}" stroke="#94a3b8" stroke-width="7" stroke-linecap="round" />`;
      }).join("");

      const motors = rotors.map((r) => {
        const relx = Number(r.x) - Number(params.cgx);
        const rely = Number(r.y) - Number(params.cgy);
        const x = 230 + relx * scale;
        const y = 230 - rely * scale;
        const rad = 22 + 18 * (Number(r.K) / maxK);
        const eta = Math.max(0, Math.min(1, Number(r.eta)));
        const fill = eta === 0 ? "#fee2e2" : `rgba(191,219,254,${0.25 + 0.75 * eta})`;
        const stroke = eta === 0 ? "#dc2626" : "#2563eb";
        const dirColor = r.dir === "CW" ? "#1d4ed8" : "#7c3aed";
        const theta = Number(r.tiltDeg) || 0;
        const { tx, ty } = thrustDirParts(r, { x: Number(params.cgx), y: Number(params.cgy), z: Number(params.cgz) });
        // 俯视图中 SVG 的 y 轴向下，这里把倾角箭头方向翻转，修正原先正/负倾角显示反向的问题。
        const arrowSign = Math.sin(deg2rad(theta)) < 0 ? 1 : -1;
        const arrowLen = Math.min(52, Math.max(0, Math.abs(theta)) * 2.2);
        const arrow = arrowLen > 0.5
          ? `<line x1="${x}" y1="${y}" x2="${x + arrowSign * tx * arrowLen}" y2="${y - arrowSign * ty * arrowLen}" stroke="#f59e0b" stroke-width="4" stroke-linecap="round" marker-end="url(#tiltArrow)"><title>倾角箭头：已按当前 θ 正负方向修正显示</title></line>`
          : "";
        return `
          <g>
            <circle cx="${x}" cy="${y}" r="${rad}" fill="${fill}" stroke="${stroke}" stroke-width="3" />
            ${arrow}
            <text x="${x}" y="${y + 5}" text-anchor="middle" font-size="17" font-weight="950">${escapeHTML(r.name)}</text>
            <text x="${x}" y="${y + rad + 16}" text-anchor="middle" font-size="12" font-weight="950" fill="${dirColor}">${escapeHTML(r.dir)} · θ=${fmt(theta, 1)}°</text>
            ${eta === 0 ? `<text x="${x}" y="${y - rad - 8}" text-anchor="middle" font-size="12" font-weight="900" fill="#dc2626">failed</text>` : ""}
          </g>
        `;
      }).join("");

      return `
        <svg viewBox="0 0 460 460" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <marker id="tiltArrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
              <path d="M0,0 L0,6 L7,3 z" fill="#f59e0b" />
            </marker>
          </defs>
          ${grid}
          <line x1="30" y1="230" x2="430" y2="230" stroke="#94a3b8" />
          <line x1="230" y1="430" x2="230" y2="30" stroke="#94a3b8" />
          ${arms}
          <circle cx="230" cy="230" r="6" fill="#0f172a" />
          <text x="240" y="224" font-size="14" font-weight="900">CG</text>
          ${motors}
        </svg>
      `;
    }

    function matrixText(out) {
      return ["Fz", "tau_x", "tau_y", "tau_z"]
        .map((name, r) => `${name.padEnd(6)} | ${out.B[r].map((x) => fmt(x, 4).padStart(9)).join(" ")}`)
        .join("\n");
    }

    function colName(idx, out) {
      const nR = out.nRotors != null ? out.nRotors : rotors.length;
      if (idx < nR) return rotors[idx] ? rotors[idx].name : `?${idx}`;
      if (idx === nR) return "Duct+";
      if (idx === nR + 1) return "Duct-";
      return `?${idx}`;
    }

    function detailRows(out) {
      return out.details.slice(0, 8).map((it) => `
        <tr>
          <td class="mono">${it.S.map((x) => escapeHTML(colName(x, out))).join(", ")}</td>
          <td class="mono">${it.S2.map((x) => escapeHTML(colName(x, out))).join(", ")}</td>
          <td class="right mono">${fmt(it.dj)}</td>
        </tr>
      `).join("");
    }

    function scanCasesForRotors(baseRotors) {
      const cases = [{ label: "正常", data: baseRotors, ductOverride: null }];
      baseRotors.forEach((r, i) => {
        cases.push({
          label: `桨 ${r.name} 失效`,
          data: baseRotors.map((x, idx) => idx === i ? { ...x, eta: 0 } : x),
          ductOverride: null
        });
      });
      return cases;
    }

    // metric 取值：rho / mx / my / mz
    function evalMetric(rotorsArr, p, metric, d) {
      if (metric === "rho") return computeRho(rotorsArr, p, d).rho;
      const m = computeMomentMargins(rotorsArr, p, d);
      if (!m.feasible) return -Infinity;
      return m[metric].min;  // 对称裕度 min(+方向, -方向)
    }

    function computeWorstCaseMetric(baseRotors, p, metric) {
      const cases = scanCasesForRotors(baseRotors);
      // 如启用了涵道，按扫描设置决定是否加入"涵道失效"场景
      if (ductActive(duct) && scanParams.includeDuctFailure) {
        cases.push({ label: "涵道失效", data: baseRotors, ductOverride: { ...duct, enabled: false } });
      }
      let worst = { value: Infinity, label: "" };
      for (const c of cases) {
        const useDuct = c.ductOverride !== null ? c.ductOverride : duct;
        const v = evalMetric(c.data, p, metric, useDuct);
        if (v < worst.value) worst = { value: v, label: c.label };
      }
      return worst;
    }

    function scanRhoGrid() {
      const x0 = Number(scanParams.xMinMm);
      const x1 = Number(scanParams.xMaxMm);
      const y0 = Number(scanParams.yMinMm);
      const y1 = Number(scanParams.yMaxMm);
      const step = Math.max(1, Math.abs(Number(scanParams.stepMm) || 10));
      const xmin = Math.min(x0, x1);
      const xmax = Math.max(x0, x1);
      const ymin = Math.min(y0, y1);
      const ymax = Math.max(y0, y1);

      const xs = [];
      for (let x = xmin; x <= xmax + EPS; x += step) xs.push(+x.toFixed(6));

      const ys = [];
      for (let y = ymin; y <= ymax + EPS; y += step) ys.push(+y.toFixed(6));

      const rows = [];
      const values = [];
      const positiveValues = [];
      const negativeValues = [];
      let min = Infinity;
      let max = -Infinity;
      let best = { rho: -Infinity, x: NaN, y: NaN, caseLabel: "" };
      let worst = { rho: Infinity, x: NaN, y: NaN, caseLabel: "" };
      let positiveCount = 0;
      let nonFiniteCount = 0;

      const metric = scanParams.metric || "rho";

      for (let yi = ys.length - 1; yi >= 0; yi--) {
        const y = ys[yi];
        const row = [];
        for (const x of xs) {
          const p = { ...params, cgx: x / 1000, cgy: y / 1000 };
          // 每个扫描点的热力图值定义为：正常 + 所有单桨失效场景中的最小指标值。
          const worstCase = computeWorstCaseMetric(rotors, p, metric);
          const rho = worstCase.value;
          const caseLabel = worstCase.label;
          row.push({ x, y, rho, caseLabel });
          if (Number.isFinite(rho)) {
            values.push(rho);
            min = Math.min(min, rho);
            max = Math.max(max, rho);
            if (rho > best.rho) best = { rho, x, y, caseLabel };
            if (rho < worst.rho) worst = { rho, x, y, caseLabel };
            if (rho > 0) {
              positiveCount += 1;
              positiveValues.push(rho);
            }
            if (rho < 0) negativeValues.push(rho);
          } else {
            nonFiniteCount += 1;
          }
        }
        rows.push(row);
      }

      const total = xs.length * ys.length;
      if (!values.length) {
        min = -Infinity;
        max = -Infinity;
        best = { rho: -Infinity, x: NaN, y: NaN, caseLabel: "rank 不足 / 无有限值" };
        worst = { rho: -Infinity, x: NaN, y: NaN, caseLabel: "rank 不足 / 无有限值" };
      }

      const posMin = positiveValues.length ? Math.min(...positiveValues) : NaN;
      const posMax = positiveValues.length ? Math.max(...positiveValues) : 0;
      const negAbsMax = negativeValues.length ? Math.max(...negativeValues.map((v) => Math.abs(v))) : 0;

      return {
        xs,
        ys,
        rows,
        min,
        max,
        best,
        worst,
        total,
        positiveCount,
        nonFiniteCount,
        posMin,
        posMax,
        negAbsMax,
        metric,
        maxAbs: Math.max(1, ...values.map((v) => Math.abs(v)))
      };
    }

    function heatmapSVG(scan) {
      const cell = 10;
      const left = 60;
      const top = 28;
      const right = 178;
      const bottom = 44;
      const heatW = scan.xs.length * cell;
      const heatH = scan.rows.length * cell;
      const barH = Math.max(90, Math.min(150, heatH * 0.38));
      const w = left + heatW + right;
      const h = Math.max(top + heatH + bottom, top + 20 + barH + 60 + barH + 38);
      const xTicks = scan.xs.filter((_, i) => i === 0 || i === scan.xs.length - 1 || scan.xs[i] % 100 === 0);
      const yVals = scan.rows.map((row) => row[0]?.y).filter((v) => v !== undefined);

      const cells = scan.rows.map((row, r) => row.map((pt, c) => {

        const unit = scan.metric === "rho" ? "" : " N·m";

        return `<rect x="${left + c * cell}" y="${top + r * cell}" width="${cell + 0.1}" height="${cell + 0.1}" fill="${fill}"><title>${escapeHTML(title)}</title></rect>`;
      }).join("")).join("");

      const xAxis = xTicks.map((x) => {
        const idx = scan.xs.indexOf(x);

      }).join("");

      const yAxis = yTicks.map((y) => {
        const rowIndex = yVals.indexOf(y);
        const py = top + rowIndex * cell + cell / 2;
        return `<g><line x1="${left - 5}" y1="${py}" x2="${left}" y2="${py}" stroke="#64748b" /><text x="${left - 9}" y="${py + 4}" text-anchor="end" font-size="11" fill="#475569">${y}</text></g>`;
      }).join("");

      const barX = left + heatW + 36;
      const barW = 16;
      const negBarY = top + 20;
      const posBarY = negBarY + barH + 60;
      const metricUnit = scan.metric === "rho" ? "" : " N·m";
      const negLabel = scan.metric === "rho" ? "不可解 ρ<0" : `负裕度 ${scan.metric}<0`;
      const posLabel = scan.metric === "rho" ? "有解 ρ>0" : `正裕度 ${scan.metric}>0`;
      const negBottomLabel = scan.negAbsMax > EPS ? `-${fmt(scan.negAbsMax, 2)}` : "无<0";
      const posTopLabel = scan.posMax > EPS ? fmt(scan.posMax, 2) : "无>0";
      const negFill = scan.negAbsMax > EPS ? "url(#negRhoBar)" : "#f8fafc";
      const posFill = scan.posMax > EPS ? "url(#posRhoBar)" : "#f8fafc";
      const colorBars = `
        <g>
          <text x="${barX - 6}" y="${negBarY - 8}" font-size="11" font-weight="900" fill="#334155">${negLabel}${metricUnit}</text>
          <rect x="${barX}" y="${negBarY}" width="${barW}" height="${barH}" rx="3" fill="${negFill}" stroke="#94a3b8" />
          <text x="${barX + barW + 6}" y="${negBarY + 4}" font-size="10" fill="#475569">0</text>
          <text x="${barX + barW + 6}" y="${negBarY + barH + 4}" font-size="10" fill="#475569">${negBottomLabel}</text>
          <text x="${barX - 6}" y="${posBarY - 8}" font-size="11" font-weight="900" fill="#334155">${posLabel}${metricUnit}</text>
          <rect x="${barX}" y="${posBarY}" width="${barW}" height="${barH}" rx="3" fill="${posFill}" stroke="#94a3b8" />
          <text x="${barX + barW + 6}" y="${posBarY + 4}" font-size="10" fill="#475569">${posTopLabel}</text>
          <text x="${barX + barW + 6}" y="${posBarY + barH + 4}" font-size="10" fill="#475569">0</text>
          <text x="${barX - 6}" y="${posBarY + barH + 22}" font-size="10" fill="#64748b">正值单独归一化</text>
        </g>
      `;

      const currentX = Number(params.cgx) * 1000;
      const currentY = Number(params.cgy) * 1000;
      const inX = currentX >= scan.xs[0] && currentX <= scan.xs[scan.xs.length - 1];
      const inY = currentY >= Math.min(...scan.ys) && currentY <= Math.max(...scan.ys);
      let marker = "";
      if (inX && inY) {
        const mx = left + ((currentX - scan.xs[0]) / Math.max(1, Number(scanParams.stepMm))) * cell + cell / 2;
        const my = top + ((Math.max(...scan.ys) - currentY) / Math.max(1, Number(scanParams.stepMm))) * cell + cell / 2;
        marker = `
          <g>
            <circle cx="${mx}" cy="${my}" r="7" fill="none" stroke="#0f172a" stroke-width="2" />
            <line x1="${mx - 9}" y1="${my}" x2="${mx + 9}" y2="${my}" stroke="#0f172a" stroke-width="2" />
            <line x1="${mx}" y1="${my - 9}" x2="${mx}" y2="${my + 9}" stroke="#0f172a" stroke-width="2" />
            <title>当前 CG: x=${fmt(currentX, 1)} mm, y=${fmt(currentY, 1)} mm</title>
          </g>
        `;
      }

      return `
        <svg class="heatmap-svg" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="negRhoBar" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#fef3c7" />
              <stop offset="100%" stop-color="#b91c1c" />
            </linearGradient>
            <linearGradient id="posRhoBar" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#2563eb" />
              <stop offset="100%" stop-color="#dcfce7" />
            </linearGradient>
          </defs>
          <rect x="0" y="0" width="${w}" height="${h}" fill="#ffffff" />
          <text x="${left}" y="18" font-size="13" font-weight="900" fill="#334155">${escapeHTML(metricTitle(scan.metric))}</text>
          ${cells}
          <rect x="${left}" y="${top}" width="${heatW}" height="${heatH}" fill="none" stroke="#334155" stroke-width="1" />
          ${marker}
          ${xAxis}
          ${yAxis}
          ${colorBars}
          <text x="${left + heatW / 2}" y="${top + heatH + 36}" text-anchor="middle" font-size="12" font-weight="900" fill="#334155">CG x / mm</text>
          <text x="15" y="${top + heatH / 2}" text-anchor="middle" font-size="12" font-weight="900" fill="#334155" transform="rotate(-90 15 ${top + heatH / 2})">CG y / mm</text>
        </svg>
      `;
    }

                <h2>布局俯视图</h2>
                <div class="svg-wrap">${layoutSVG(scale, maxK)}</div>
                <div class="notice notice-blue" style="margin-top: 16px;">电机数 n=<b>${rotors.length}</b>；B rank=<b>${out.rank}</b>；ΣηK=<b>${fmt(totalThrust, 3)} N</b>；ΣηKcosθ=<b>${fmt(verticalCapacity, 3)} N</b>；mg=<b>${fmt(out.G[0], 3)} N</b>${out.hasDuct ? `；涵道：<b>${escapeHTML(DUCT_AXIS_LABEL[duct.axis])} ±${fmt(duct.maxTorque, 2)} N·m</b>` : "；涵道：<b>未启用</b>"}</div>
              </div>

              <div class="card">
                <h2>当前 Bf 矩阵</h2>
                <pre>${escapeHTML(matrixText(out))}</pre>
                <h3 style="margin-top: 20px;">最限制的边界方向</h3>
                <table>
                  <thead><tr><th>S</th><th>S₂</th><th class="right">dj</th></tr></thead>
                  <tbody>${detailRows(out)}</tbody>
                </table>
              </div>
            </section>

            <section class="card">
              <h2>单电机失效扫描</h2>
              <p style="margin-bottom: 16px;">把每个电机分别设为 ηᵢ=0，其余电机保持当前 η，计算对应的 ρ 以及三轴可达力矩区间 [τ_min, τ_max]（在维持 Fz=mg 且其它两轴力矩=0 时）。<b>区间含 0</b>（绿色）⇔ 该轴 hover 可行；<b>不含 0</b>（红色）表示该轴存在不可消除的偏置力矩。</p>
              <div class="table-wrap">
                <table>
                  <thead><tr><th>场景</th><th class="right">ρ</th><th>判定</th><th class="right">τx range / N·m</th><th class="right">τy range / N·m</th><th class="right">τz range / N·m</th></tr></thead>
                  <tbody>${faultRowsHTML()}</tbody>
                </table>
              </div>
            </section>
          </div>
        </div>
      `;

      bindEvents();
    }

    function bindEvents() {
      document.querySelectorAll('[data-kind="param"]').forEach((el) => {
        el.addEventListener("change", (e) => updateParam(e.target.dataset.key, e.target.value));
      });

      document.querySelectorAll('[data-kind="rotor"]').forEach((el) => {
        el.addEventListener("change", (e) => updateRotor(Number(e.target.dataset.index), e.target.dataset.key, e.target.value));
      });

      document.querySelectorAll('[data-kind="scan"]').forEach((el) => {
        el.addEventListener("change", (e) => updateScanParam(e.target.dataset.key, e.target.value));
      });

      document.querySelectorAll('[data-kind="duct"]').forEach((el) => {
        el.addEventListener("change", (e) => updateDuct(e.target.dataset.key, e.target.value));
      });

      const presetSelect = document.getElementById("presetSelect");
      if (presetSelect) presetSelect.addEventListener("change", (e) => loadPreset(e.target.value));

      document.querySelectorAll("[data-action]").forEach((el) => {
        el.addEventListener("click", (e) => {
          const action = e.currentTarget.dataset.action;
          if (action === "add-rotor") addRotor();
          if (action === "remove-last") removeLastRotor();
          if (action === "reset-eta") resetEta();
          if (action === "fail-rotor") updateRotor(Number(e.currentTarget.dataset.index), "eta", 0);
        });
      });
    }

    render();
  </script>
